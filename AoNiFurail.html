<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アオニ・フ・レール // Dont Touch Red</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #eee;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; /* スクロール防止 */
            user-select: none; /* テキスト選択防止 */
            -webkit-user-select: none;
            touch-action: none; /* スマホのズーム等を防止 */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* スコア表示 */
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none; /* UIを貫通してタップ可能に */
        }

        #score {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,255,255,0.7);
        }

        #level {
            font-size: 1.2rem;
            color: #aaa;
        }

        /* 丸の基本スタイル */
        .circle {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            transform: translate(-50%, -50%); /* 中心を基準に配置 */
            transition: transform 0.1s ease-out, opacity 0.1s ease-out; /* 消える時のアニメ */
        }

        /* 青い丸（タップ対象） */
        .circle.target {
            background: radial-gradient(circle at 30% 30%, #4facfe 0%, #00f2fe 100%);
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(0,242,254,0.8);
        }

        /* 赤い丸（邪魔者） */
        .circle.danger {
            background: radial-gradient(circle at 30% 30%, #ff0844 0%, #ffb199 100%);
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255,8,68,0.8);
        }

        /* 消える時のクラス */
        .circle.pop {
            transform: translate(-50%, -50%) scale(1.5);
            opacity: 0;
        }

        /* オーバーレイ（タイトル・ゲームオーバー） */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .overlay h1 {
            font-size: 2.5rem;
            color: #00f2fe;
            text-shadow: 0 0 15px #00f2fe;
            margin-bottom: 10px;
        }

        .overlay .subtitle {
            font-size: 1rem;
            color: #ff0844;
            margin-bottom: 40px;
        }

        .overlay p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        #final-score {
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
        }

        button {
            background: none;
            border: 2px solid #00f2fe;
            color: #00f2fe;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(0,242,254,0.4);
        }

        button:hover {
            background-color: #00f2fe;
            color: #111;
            box-shadow: 0 0 30px rgba(0,242,254,0.8);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div id="score">0</div>
        <div id="level">LV 1</div>
    </div>

    <div id="stage"></div>

    <div id="title-overlay" class="overlay">
        <h1>アオニ・フ・レール</h1>
        <div class="subtitle">Don't Touch Red</div>
        <p>【遊び方】</p>
        <p style="color: #4facfe;">● 青い丸だけをタップしろ</p>
        <p style="color: #ff0844;">● 赤い丸と、見逃しは即死</p>
        <button onclick="startGame()">START</button>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
        <p>GAME OVER</p>
        <div id="final-score">0</div>
        <p id="gameover-msg"></p>
        <button onclick="startGame()">RETRY</button>
    </div>
</div>

<script>
    const stage = document.getElementById('stage');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const finalScoreEl = document.getElementById('final-score');
    const msgEl = document.getElementById('gameover-msg');
    const titleOverlay = document.getElementById('title-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');

    let score = 0;
    let level = 1;
    let isPlaying = false;
    let circles = [];
    let gameLoopInterval;
    let spawnTimer;

    // ゲーム設定
    const config = {
        baseSpeed: 2,       // 初期速度
        speedStep: 0.5,     // レベルアップごとの速度上昇
        baseSpawnRate: 1000, // 初期生成間隔(ms)
        dangerRatio: 0.2    // 赤い丸が出る確率 (0.0〜1.0)
    };

    // ゲーム開始
    function startGame() {
        score = 0;
        level = 1;
        isPlaying = true;
        circles = [];
        stage.innerHTML = ''; // 画面クリア
        updateUI();

        titleOverlay.classList.add('hidden');
        gameoverOverlay.classList.add('hidden');

        // メインループ (移動処理と上部到達判定)
        gameLoopInterval = setInterval(gameLoop, 1000 / 60); // 60fps
        
        // 丸の生成ループ
        spawnCircle();
    }

    // メインループ
    function gameLoop() {
        if (!isPlaying) return;

        const currentSpeed = config.baseSpeed + (level - 1) * config.speedStep;
        const stageHeight = window.innerHeight;

        for (let i = circles.length - 1; i >= 0; i--) {
            const c = circles[i];
            c.y -= currentSpeed; // 上へ移動
            c.el.style.top = c.y + 'px';

            // 画面上部に到達したか判定
            if (c.y + c.size < 0) {
                if (c.type === 'target') {
                    endGame('青い丸を見逃した！');
                    return;
                } else {
                    // 赤い丸は消してOK
                    removeCircle(c, false);
                }
            }
        }
    }

    // 丸を生成
    function spawnCircle() {
        if (!isPlaying) return;

        const size = Math.random() * 30 + 50; // サイズ 50〜80px
        const x = Math.random() * (window.innerWidth - size) + size/2;
        const y = window.innerHeight + size; // 画面下から登場
        
        const type = Math.random() < config.dangerRatio ? 'danger' : 'target';

        const circleEl = document.createElement('div');
        circleEl.className = `circle ${type}`;
        circleEl.style.width = size + 'px';
        circleEl.style.height = size + 'px';
        circleEl.style.left = x + 'px';
        circleEl.style.top = y + 'px';

        // タップ/クリックイベント
        const eventType = 'ontouchstart' in window ? 'touchstart' : 'mousedown';
        circleEl.addEventListener(eventType, (e) => {
            e.preventDefault(); // イベントのバブリング等を防ぐ
            handleTap(circleObj);
        });

        stage.appendChild(circleEl);

        const circleObj = {
            el: circleEl,
            x: x,
            y: y,
            size: size,
            type: type
        };

        circles.push(circleObj);

        // 次の生成を予約 (レベルが上がるほど早く)
        const currentSpawnRate = Math.max(200, config.baseSpawnRate - (level - 1) * 100);
        spawnTimer = setTimeout(spawnCircle, currentSpawnRate);
    }

    // タップ処理
    function handleTap(circleObj) {
        if (!isPlaying) return;

        if (circleObj.type === 'danger') {
            endGame('赤い丸に触れた！');
        } else {
            score++;
            updateUI();
            removeCircle(circleObj, true); // アニメーション付きで消す
            
            // レベルアップ判定 (10点ごと)
            if (score % 10 === 0) {
                level++;
                updateUI();
            }
        }
    }

    // 丸を削除
    function removeCircle(circleObj, animate) {
        const index = circles.indexOf(circleObj);
        if (index > -1) {
            circles.splice(index, 1);
            
            if (animate) {
                circleObj.el.classList.add('pop'); // popアニメーション
                setTimeout(() => {
                    if(circleObj.el.parentNode === stage) stage.removeChild(circleObj.el);
                }, 100);
            } else {
                if(circleObj.el.parentNode === stage) stage.removeChild(circleObj.el);
            }
        }
    }

    // UI更新
    function updateUI() {
        scoreEl.innerText = score;
        levelEl.innerText = `LV ${level}`;
    }

    // ゲームオーバー
    function endGame(msg) {
        isPlaying = false;
        clearInterval(gameLoopInterval);
        clearTimeout(spawnTimer);
        
        finalScoreEl.innerText = score;
        msgEl.innerText = msg;
        gameoverOverlay.classList.remove('hidden');
    }

</script>
</body>
</html>
